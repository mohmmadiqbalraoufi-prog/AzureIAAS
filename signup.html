<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت نام - Azure IaaS</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="signup-container">

  <!-- LEFT SIDE (Branding like your hero section) -->
  <div class="signup-left">
    <h1>Azure IaaS</h1>
    <p>زیرساخت ابری سریع، امن و مقیاس‌پذیر</p>
  </div>

  <!-- RIGHT SIDE (Form) -->
  <div class="signup-box">
    <h2>ایجاد حساب کاربری</h2>

    <form>

      <input type="text" placeholder="نام کامل" required>

      <input type="email" placeholder="ایمیل" required>

      <input type="password" placeholder="رمز عبور" required>

      <input type="password" placeholder="تکرار رمز عبور" required>

      <button type="submit">ثبت نام</button>

    </form>

    <p class="login-link">
      حساب دارید؟
      <a href="Login Page.html">ورود</a>
    </p>

  </div>

</div>

</body>
</html>
