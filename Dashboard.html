<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Azure IaaS</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Azure</h2>

    <a href="#"> داشبورد</a>
    <a href="#"> ماشین مجازی</a>
    <a href="#"> ذخیره‌سازی</a>
    <a href="#"> شبکه</a>
    <a href="#"> امنیت</a>
    <a href="#"> قیمت</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <h3>داشبورد</h3>
      <button class="create-btn">+ ایجاد منبع</button>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <h4>ماشین‌های فعال</h4>
        <p>12</p>
      </div>

      <div class="card">
        <h4>ذخیره‌سازی</h4>
        <p>1.2 TB</p>
      </div>

      <div class="card">
        <h4>شبکه‌ها</h4>
        <p>5</p>
      </div>

      <div class="card">
        <h4>هشدارها</h4>
        <p>2</p>
      </div>

    </div>

    <!-- TABLE -->
    <div class="table-section">
      <h3>ماشین‌های مجازی</h3>

      <table>
        <tr>
          <th>نام</th>
          <th>وضعیت</th>
          <th>CPU</th>
          <th>RAM</th>
        </tr>

        <tr>
          <td>VM-1</td>
          <td>فعال</td>
          <td>40%</td>
          <td>8GB</td>
        </tr>

        <tr>
          <td>VM-2</td>
          <td>متوقف</td>
          <td>0%</td>
          <td>4GB</td>
        </tr>

      </table>
    </div>

  </main>

</div>

</body>
</html>
